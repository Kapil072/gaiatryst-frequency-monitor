import os
import requests
import time
from datetime import datetime, timedelta
from playwright.sync_api import sync_playwright

def download_most_recent_available():
    url = "https://www.heartmath.org/gci/gcms/live-data/spectrogram-calendar/"
    save_folder = "spectrogram_downloads"
    
    if not os.path.exists(save_folder):
        os.makedirs(save_folder)

    # We use sync_playwright() as a context manager
    with sync_playwright() as p:
        print("🚀 Launching Browser...")
        browser = p.chromium.launch(headless=True)
        
        # Creating context and page
        context = browser.new_context(
            user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
        )
        page = context.new_page()

        try:
            print(f"📡 Connecting to {url}...")
            page.goto(url, wait_until="load", timeout=60000)
            print("⏳ Waiting for calendar to load...")
            time.sleep(10) 

            found = False
            # Check last 7 days (1 to 7)
            for i in range(1, 8):
                target_date = (datetime.now() - timedelta(days=i)).strftime("%Y-%m-%d")
                print(f"🔍 Checking for data from: {target_date}...")

                found_images = []
                # Scan through all iframes on the page
                for frame in page.frames:
                    # Target spectrogram images with the specific date in the URL
                    selector = 'img[src*="spectrograms"][src*="' + target_date + '"]'
                    imgs = frame.locator(selector).all()
                    for img in imgs:
                        src = img.get_attribute("src")
                        if src:
                            found_images.append(src)

                if len(found_images) > 0:
                    print(f"✅ Found {len(found_images)} images for {target_date}!")
                    for src in found_images:
                        file_name = src.split("/")[-1].split("?")[0]
                        file_path = os.path.join(save_folder, file_name)
                        
                        # Use requests to download the binary content
                        response = requests.get(src, timeout=15)
                        if response.status_code == 200:
                            with open(file_path, 'wb') as f:
                                f.write(response.content)
                            print(f"   💾 Saved: {file_name}")
                    
                    found = True
                    break 
                else:
                    print(f"   ⚠️ No data for {target_date}, checking previous day...")

            if not found:
                print("❌ No data found in the last 7 days.")

        except Exception as e:
            print(f"⚠️ Error occurred: {e}")
        finally:
            browser.close()

if __name__ == "__main__":
    download_most_recent_available()
