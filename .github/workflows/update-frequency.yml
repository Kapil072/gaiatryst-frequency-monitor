name: Update Spectrogram Data

on:
  schedule:
    # Runs every 6 hours at minute 0 (UTC) - Updated for Node.js 24 compatibility
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Manual trigger available

permissions:
  contents: write  # This is REQUIRED so the bot is allowed to save the images back to your repo

jobs:
  scrape-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5  # Node.js 24 compatible

      - name: Set up Python
        uses: actions/setup-python@v6  # Node.js 24 compatible
        with:
          python-version: '3.12'

      - name: Install Python packages and Playwright browser
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          python -m playwright install chromium

      - name: Run the Scraper
        # Make sure this matches the exact name of your python file
        run: python python/main.py

      - name: Commit and Push new images
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add spectrogram_downloads/
          git commit -m "Auto-update latest spectrogram images" || echo "No new images to commit"
          git push
