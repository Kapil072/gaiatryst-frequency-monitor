import os
import requests
import time
from datetime import datetime, timedelta
from playwright.sync_api import sync_playwright

def download_most_recent_available():
    url = "https://www.heartmath.org/gci/gcms/live-data/spectrogram-calendar/"
    save_folder = "spectrogram_downloads"
    
    if not os.path.exists(save_folder):
        os.makedirs(save_folder)

    with sync_playwright() as p:
        print("🚀 Launching Browser...")
        browser = p.chromium.launch(headless=True)
        context = browser.new_context(
            user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
        )
        page = context.new_page()

        try:
            print(f"📡 Connecting to {url}...")
            page.goto(url, wait_until="load", timeout=60000)
            print("⏳ Waiting for calendar to load...")
            time.sleep(10) # Essential for the JS calendar to populate

            # We will try the last 7 days, starting from yesterday
            found = False
            for i in range(1, 8):
                target_date = (datetime.now() - timedelta(days=i)).strftime("%Y-%m-%d")
                print(f"🔍 Checking for data from: {target_date}...")

                found_images = []
                for frame in page.frames:
                    # Search for images matching this specific date
                    selector = f'img[src*="spectrograms"][src*="{target_date}"]'
                    imgs = frame.locator(selector).all()
                    for img in imgs:
                        src = img.get_attribute("src")
                        if src:
                            found_images.append(src)

                if found_images:
                    print(f"✅ Found {len(found_images)} images for {target_date}!")
                    for src in found_images:
                        file_name = src.split("/")[-1].split("?")[0]
                        file_path = os.path.join(save_folder, file_name)
                        
                        img_data = requests.get(src).content
                        with open(file_path, 'wb') as f:
                            f.write(img_data)
                        print(f"   💾 Saved: {file_name}")
                    
                    found = True
                    break # Stop searching once we find the latest available day
                else:
                    print(f"   ⚠️ No data for {target_date}, checking previous day...")

            if not found:
                print("❌ No data found in the last 7 days. The site might be down or changed structure.")

        except Exception as e:
            print(f"⚠️ Error: {e}")
        finally:
            browser.close()

if __name__ == "__main__":
    download_most_recent_available()
