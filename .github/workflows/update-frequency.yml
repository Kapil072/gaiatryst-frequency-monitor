name: Live Spectrogram Update

on:
  schedule:
    - cron: '*/15 * * * *'  # Runs every 15 minutes to keep data fresh
  workflow_dispatch:      # Allows manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  fetch-analyze-save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager opencv-python-headless numpy requests

      - name: Run OpenCV Scraper
        run: |
          python << 'EOF'
          import json
          import time
          import datetime
          import os
          import requests
          import cv2
          import numpy as np
          from selenium import webdriver
          from selenium.webdriver.chrome.service import Service
          from selenium.webdriver.chrome.options import Options
          from webdriver_manager.chrome import ChromeDriverManager

          # --- CONFIG ---
          TARGET_URL = "https://www.heartmath.org/gci/gcms/live-data/spectrogram-calendar/"
          ALL_GCI_STATIONS = ["GCI001", "GCI002", "GCI003", "GCI004", "GCI005", "GCI006"]
          OUTPUT_FILE = "data.json"

          def analyze_spectrogram(image_path):
              # Load spectrogram
              img = cv2.imread(image_path)
              if img is None:
                  print(f"❌ Image not found or corrupted: {image_path}")
                  return 0.0

              # Convert to grayscale and blur
              gray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)
              gray = cv2.GaussianBlur(gray, (5, 5), 0)
              
              # Get dimensions
              height, width = gray.shape

              # Crop out left/right borders to avoid reading text (keep middle 70%)
              crop_x1 = int(width * 0.15)
              crop_x2 = int(width * 0.85)
              graph_center = gray[:, crop_x1:crop_x2]

              # Spectrogram frequency range
              FMAX = 50
              
              # Brightness per row on the cropped center
              row_intensity = np.mean(graph_center, axis=1)

              # Convert 7–9 Hz region into pixel coordinates
              low_freq = 7
              high_freq = 9

              y_low = int(height * (1 - high_freq / FMAX))
              y_high = int(height * (1 - low_freq / FMAX))

              region = row_intensity[y_low:y_high]
              
              if len(region) == 0:
                  return 0.0

              # Strongest signal in this region
              peak_index = np.argmax(region)
              peak_row = peak_index + y_low

              # Convert back to frequency
              frequency = (1 - peak_row / height) * FMAX
              return round(frequency, 2)

          def process_data():
              print("Launching headless browser...")
              chrome_options = Options()
              chrome_options.add_argument("--headless")
              chrome_options.add_argument("--window-size=1920,1080")
              chrome_options.add_argument("--no-sandbox")
              chrome_options.add_argument("--disable-dev-shm-usage")

              service = Service(ChromeDriverManager().install())
              driver = webdriver.Chrome(service=service, options=chrome_options)

              output_data = {
                  "timestamp": datetime.datetime.now(datetime.timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC'),
                  "global_avg": 0.0,
                  "stations": {k: 0.0 for k in ALL_GCI_STATIONS},
                  "active_stations": 0,
                  "source": "HeartMath Spectrogram Analysis",
                  "status": "failed"
              }

              stations_found = {}
              site_values = []

              try:
                  driver.get(TARGET_URL)
                  # Give Highcharts/Images plenty of time to render
                  time.sleep(15) 

                  images = driver.find_elements("tag name", "img")
                  img_urls = [img.get_attribute("src") for img in images if img.get_attribute("src")]

                  # Spoof headers so the server doesn't block the image download
                  headers = {
                      "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
                  }

                  for station in ALL_GCI_STATIONS:
                      target_img_url = None
                      # Look for the station ID in the image URL
                      for url in img_urls:
                          if station.lower() in url.lower():
                              target_img_url = url
                              break
                      
                      if target_img_url:
                          print(f"✅ Found spectrogram for {station}, downloading...")
                          response = requests.get(target_img_url, headers=headers)
                          
                          if response.status_code == 200:
                              img_path = f"{station}_spectrogram.png"
                              with open(img_path, 'wb') as handler:
                                  handler.write(response.content)
                              
                              # Analyze with OpenCV
                              freq = analyze_spectrogram(img_path)
                              print(f"📈 {station} Peak Frequency: {freq} Hz")

                              if freq > 0:
                                  stations_found[station] = freq
                                  site_values.append(freq)
                                  
                              # Cleanup image
                              if os.path.exists(img_path):
                                  os.remove(img_path)
                          else:
                              print(f"⚠️ Failed to download image for {station}. HTTP Status: {response.status_code}")

              except Exception as e:
                  print(f"❌ Error during scraping: {e}")
              finally:
                  driver.quit()

              # Final Calculations
              if stations_found:
                  active_count = len(site_values)
                  avg = sum(site_values) / active_count if active_count > 0 else 0

                  output_data["global_avg"] = round(avg, 2)
                  output_data["stations"] = stations_found
                  output_data["active_stations"] = active_count
                  output_data["status"] = "success"
                  print(f"🎉 Success! Global Avg: {avg:.2f} Hz")
              else:
                  print("❌ No valid readings extracted.")

              # Save to JSON
              with open(OUTPUT_FILE, 'w') as f:
                  json.dump(output_data, f, indent=2)
              print(f"💾 Saved to {OUTPUT_FILE}")

          if __name__ == "__main__":
              process_data()
          EOF

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          touch data.json
          git add data.json
          # Push only if there are new changes
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated update: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
