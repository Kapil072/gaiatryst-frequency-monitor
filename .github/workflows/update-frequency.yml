name: Update Spectrogram Data

on:
  schedule:
    # This runs every 6 hours. Line 7 is usually here.
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allows you to run the script manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright requests
          python -m playwright install chromium

      - name: Run Scraper
        run: python latest_available.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add spectrogram_downloads/*
          git commit -m "Update latest spectrogram [skip ci]" || echo "No changes to commit"
          git push
