name: Hourly Frequency Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager opencv-python-headless numpy requests

      - name: Fetch, Analyze, and Save Data
        run: |
          python << 'EOF'
          import json
          import time
          import datetime
          import os
          import requests
          import cv2
          import numpy as np
          from selenium import webdriver
          from selenium.webdriver.chrome.service import Service
          from selenium.webdriver.chrome.options import Options
          from webdriver_manager.chrome import ChromeDriverManager

          TARGET_URL = "https://www.heartmath.org/gci/gcms/live-data/spectrogram-calendar/"
          ALL_GCI_STATIONS = ["GCI001", "GCI002", "GCI003", "GCI004", "GCI005", "GCI006"]
          OUTPUT_FILE = "data.json"

          def analyze_spectrogram(image_path):
              img = cv2.imread(image_path)
              if img is None:
                  print(f"❌ OpenCV Failed to load image: {image_path}")
                  return 0.0

              gray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)
              gray = cv2.GaussianBlur(gray, (5, 5), 0)
              height = gray.shape[0]

              FMAX = 50
              row_intensity = np.mean(gray, axis=1)

              low_freq = 7
              high_freq = 9

              y_low = int(height * (1 - high_freq / FMAX))
              y_high = int(height * (1 - low_freq / FMAX))
              
              print(f"📊 OpenCV Debug for {image_path}: Image Height={height}px, Crop Region Y: {y_low} to {y_high}")

              region = row_intensity[y_low:y_high]
              if len(region) == 0:
                  print(f"❌ Crop region empty for {image_path}")
                  return 0.0

              peak_index = np.argmax(region)
              peak_row = peak_index + y_low
              frequency = (1 - peak_row / height) * FMAX
              return round(frequency, 2)

          def process_data():
              print("Launching headless browser...")
              chrome_options = Options()
              chrome_options.add_argument("--headless")
              chrome_options.add_argument("--window-size=1920,1080") # Set explicit window size
              chrome_options.add_argument("--no-sandbox")
              chrome_options.add_argument("--disable-dev-shm-usage")

              service = Service(ChromeDriverManager().install())
              driver = webdriver.Chrome(service=service, options=chrome_options)

              output_data = {
                  "timestamp": datetime.datetime.now(datetime.timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC'),
                  "global_avg": 0.0,
                  "stations": {k: 0.0 for k in ALL_GCI_STATIONS},
                  "active_stations": 0,
                  "source": "HeartMath Spectrogram Analysis (OpenCV)",
                  "scrape_status": "failed"
              }

              stations_found = {}
              site_values = []

              try:
                  print(f"Navigating to {TARGET_URL}...")
                  driver.get(TARGET_URL)
                  time.sleep(15) # Wait for elements to load
                  
                  # 1. Take a screenshot to see what Selenium sees
                  driver.save_screenshot("debug_browser_screenshot.png")
                  print("📸 Saved browser screenshot as 'debug_browser_screenshot.png'")

                  images = driver.find_elements("tag name", "img")
                  img_urls = [img.get_attribute("src") for img in images if img.get_attribute("src")]
                  
                  print(f"🔍 Found {len(img_urls)} total images on the page.")
                  print("🔗 First 5 image URLs found:", img_urls[:5])

                  for station in ALL_GCI_STATIONS:
                      target_img_url = None
                      for url in img_urls:
                          if station.lower() in url.lower():
                              target_img_url = url
                              break
                      
                      if target_img_url:
                          print(f"✅ Found URL for {station}: {target_img_url}")
                          img_data = requests.get(target_img_url).content
                          img_path = f"{station}_spectrogram.png"
                          
                          with open(img_path, 'wb') as handler:
                              handler.write(img_data)
                          
                          freq = analyze_spectrogram(img_path)
                          print(f"📈 {station} Calculated Frequency: {freq} Hz")

                          if freq > 0:
                              stations_found[station] = freq
                              site_values.append(freq)
                      else:
                          print(f"⚠️ Could not find an image URL containing '{station.lower()}'")

              except Exception as e:
                  print(f"❌ Error during execution: {e}")
              finally:
                  driver.quit()

              if stations_found:
                  active_count = len(site_values)
                  avg = sum(site_values) / active_count if active_count > 0 else 0
                  output_data["global_avg"] = round(avg, 2)
                  output_data["stations"] = stations_found
                  output_data["active_stations"] = active_count
                  output_data["scrape_status"] = "success"
                  print(f"🎉 Success! Global Avg: {avg:.2f} Hz")
              else:
                  print("❌ No spectrograms analyzed successfully.")

              with open(OUTPUT_FILE, 'w') as f:
                  json.dump(output_data, f, indent=2)

          if __name__ == "__main__":
              process_data()
          EOF

      - name: Upload Debug Artifacts
        uses: actions/upload-artifact@v4
        if: always()  # This ensures the files upload even if the script crashes
        with:
          name: scraping-debug-files
          path: |
            *.png
            data.json
          retention-days: 3

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update frequency data - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
