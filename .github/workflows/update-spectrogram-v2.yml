name: Update Spectrogram Data v2

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-data:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python packages and Playwright browser
        run: |
          python -m pip install --upgrade pip
          pip install playwright numpy opencv-python-headless
          python -m playwright install chromium

      - name: Run the Spectrogram Scraper & Analyzer
        run: |
          set -e  # Exit immediately if the script crashes
          python api/test_scraping.py
          echo "✅ Script finished successfully"

      - name: Verify data.json was created
        run: |
          if [ ! -f "data.json" ]; then
            echo "❌ ERROR: data.json was NOT created by the script!"
            echo "Files in repo root:"
            ls -la
            exit 1  # Fail the workflow so you get notified
          else
            echo "✅ data.json found!"
            echo "File size: $(wc -c < data.json) bytes"
            echo "Preview (first 500 chars):"
            head -c 500 data.json
          fi

      - name: Commit and Push data.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Add data.json
          git add data.json

          # Delete spectrogram image folders to save space
          rm -rf spectrograms_*/

          # Show what git sees
          echo "=== Git status ==="
          git status

          # Commit — if nothing changed, echo and continue (don't fail)
          git commit -m "Auto-update Schumann resonance data [skip ci]" || echo "⚠️ No new data to commit"
          git push
