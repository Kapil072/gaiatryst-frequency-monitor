name: Update Spectrogram Data v2

on:
  schedule:
    # Runs every 6 hours at minute 0 (UTC) - Updated for Node.js 24 compatibility
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Manual trigger available

permissions:
  contents: write  # This is REQUIRED so the bot is allowed to save the images back to your repo

jobs:
  scrape-data:
    runs-on: ubuntu-latest
    
    # This silences the Node 20 deprecation warning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: Checkout repository
        # Upgraded to v5 for Node 24 compatibility
        uses: actions/checkout@v5 

      - name: Set up Python
        # Upgraded to v6 for Node 24 compatibility
        uses: actions/setup-python@v6 
        with:
          python-version: '3.12'

      - name: Install Python packages and Playwright browser
        run: |
          python -m pip install --upgrade pip
          pip install playwright numpy opencv-python-headless
          python -m playwright install chromium

      - name: Run the Spectrogram Scraper & Analyzer
        run: python api/test_scraping.py 

      - name: Commit and Push new data.json (delete images after extraction)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Add data.json for Flutter app integration
          git add data.json
          
          # Delete spectrogram image folders to save space
          rm -rf spectrograms_*/
          
          # Commit the changes
          # [skip ci] prevents this commit from triggering another workflow loop
          git commit -m "Auto-update Schumann resonance data [skip ci]" || echo "No new data to commit"
          git push
