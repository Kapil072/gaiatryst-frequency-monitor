name: Update Spectrogram Data v2

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-spectrogram
  cancel-in-progress: false

jobs:
  scrape-data:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python packages and Playwright browser
        run: |
          python -m pip install --upgrade pip
          pip install playwright numpy opencv-python-headless requests
          python -m playwright install chromium

      - name: Run the Spectrogram Scraper & Analyzer
        run: |
          set -e
          cd $GITHUB_WORKSPACE
          python api/test_scraping.py
          echo "✅ Script finished"

      - name: Move data.json to root if saved in wrong place
        run: |
          if [ -f "$GITHUB_WORKSPACE/api/data.json" ] && [ ! -f "$GITHUB_WORKSPACE/data.json" ]; then
            echo "Moving data.json from api/ to root"
            cp $GITHUB_WORKSPACE/api/data.json $GITHUB_WORKSPACE/data.json
          fi
          if [ ! -f "$GITHUB_WORKSPACE/data.json" ]; then
            echo "❌ FATAL: data.json not found!"
            exit 1
          fi
          echo "✅ data.json content:"
          cat $GITHUB_WORKSPACE/data.json

      - name: Commit and Push data.json
        run: |
          cd $GITHUB_WORKSPACE

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data.json
          rm -rf spectrograms_*/
          git add -u

          if git diff --cached --quiet; then
            echo "⚠️ No changes to commit — data unchanged"
          else
            git commit -m "Auto-update Schumann resonance data [skip ci]"
            git pull --rebase origin main
            git push
            echo "✅ Pushed successfully"
          fi
```

---

### Steps to apply this now

1. Go to your repo → `.github/workflows/` → open your `.yml` file
2. Click the ✏️ **Edit** (pencil) button
3. **Select all** and replace with the full workflow above
4. Click **Commit changes**
5. Go to **Actions** tab → run manually → it will push cleanly

