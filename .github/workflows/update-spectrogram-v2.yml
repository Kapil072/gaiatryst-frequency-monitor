name: Update Spectrogram Data v2

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-spectrogram
  cancel-in-progress: false

jobs:
  scrape-data:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:

      # ─────────────────────────────────────────
      # 1. CHECKOUT
      # ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5

      # ─────────────────────────────────────────
      # 2. PYTHON SETUP
      # ─────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # ─────────────────────────────────────────
      # 3. INSTALL DEPENDENCIES
      # ─────────────────────────────────────────
      - name: Install Python packages and Playwright browser
        run: |
          python -m pip install --upgrade pip
          pip install playwright numpy opencv-python-headless requests
          python -m playwright install chromium

      # ─────────────────────────────────────────
      # 4. RUN SCRAPER
      # ─────────────────────────────────────────
      - name: Run the Spectrogram Scraper & Analyzer
        run: |
          set -e
          cd $GITHUB_WORKSPACE
          python api/test_scraping.py
          echo "✅ Scraper finished"

      # ─────────────────────────────────────────
      # 5. FIND data.json (wherever script saved it)
      # ─────────────────────────────────────────
      - name: Locate and verify data.json
        run: |
          echo "=== Searching for data.json ==="
          find $GITHUB_WORKSPACE -name "data.json" | head -20

          # If script saved it inside api/ folder, copy to root
          if [ -f "$GITHUB_WORKSPACE/api/data.json" ] && [ ! -f "$GITHUB_WORKSPACE/data.json" ]; then
            echo "⚠️ Found in api/ — copying to repo root"
            cp $GITHUB_WORKSPACE/api/data.json $GITHUB_WORKSPACE/data.json
          fi

          # Hard fail if still not found anywhere
          if [ ! -f "$GITHUB_WORKSPACE/data.json" ]; then
            echo "❌ FATAL: data.json not found anywhere! Scraper did not produce output."
            exit 1
          fi

          echo "✅ data.json found at repo root. Contents:"
          cat $GITHUB_WORKSPACE/data.json

      # ─────────────────────────────────────────
      # 6. COMMIT AND PUSH data.json FIRST
      # ─────────────────────────────────────────
      - name: Commit and Push data.json
        run: |
          cd $GITHUB_WORKSPACE

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage only data.json
          git add data.json

          # Check if data.json actually changed
          if git diff --cached --quiet; then
            echo "⚠️ data.json has not changed since last run — nothing to commit"
          else
            git commit -m "Auto-update Schumann resonance data [skip ci]"
            # Pull any remote changes before pushing (fixes rejection error)
            git pull --rebase origin main
            git push
            echo "✅ data.json committed and pushed successfully"
          fi

      # ─────────────────────────────────────────
      # 7. DELETE SPECTROGRAM IMAGES AFTER data.json IS SAFE
      # ─────────────────────────────────────────
      - name: Delete spectrogram images and push cleanup
        run: |
          cd $GITHUB_WORKSPACE

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Pull latest so we are in sync after previous push
          git pull --rebase origin main

          # Delete all spectrogram image folders
          rm -rf spectrograms_*/

          # Stage all deletions
          git add -u

          # Only commit if something was actually deleted
          if git diff --cached --quiet; then
            echo "⚠️ No spectrogram images to delete — skipping cleanup commit"
          else
            git commit -m "Cleanup: remove spectrogram images [skip ci]"
            git push
            echo "✅ Spectrogram images deleted and pushed"
          fi
